        .bg-canvas .orb:nth-child(4) { width: 400px; height: 400px; background: #ffb800; top: 55%; left: 55%; transform: translate(-50%,-50%); animation-delay: -10s; opacity: 0.25; }
        @keyframes orbFloat { 0% { transform: translate(0,0) scale(1); } 50% { transform: translate(-40px,80px) scale(0.88); } 100% { transform: translate(50px,40px) scale(0.94); } }

        .avatar-particle { position: absolute; width: 4px; height: 4px; background: #ffb800; border-radius: 50%; animation: floatAround 6s ease-in-out infinite; }
        .avatar-particle:nth-child(4) { top: -10px; left: 30%; background: #00ff88; }
        .avatar-particle:nth-child(5) { top: 80%; left: 70%; animation-delay: -2s; background: #ff7a00; }
        .avatar-particle:nth-child(6) { top: 10%; right: 10%; animation-delay: -4s; background: #ffb800; }

        .btn-primary:active { transform: translateY(-2px) scale(0.97); }
        .btn-primary i.fa-arrow-right { transition: transform 0.35s ease; }

        /* 3. Text */

<script>
    (function() {
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [], mouseX = -1000, mouseY = -1000, animationId;
        const isMobile = window.innerWidth < 768;
        const particleCount = isMobile ? 30 : 60;
        const connectionDistance = isMobile ? 90 : 140;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', () => { resize(); initParticles(); });

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
                this.vx = (Math.random()-0.5)*0.6; this.vy = (Math.random()-0.5)*0.6;
                this.size = Math.random()*2.5+0.8; this.opacity = Math.random()*0.5+0.2;
                const colors = ['rgba(255,184,0,','rgba(255,122,0,','rgba(255,0,128,','rgba(0,255,136,'];
                this.color = colors[Math.floor(Math.random()*colors.length)];
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x<-20) this.x=canvas.width+20; if(this.x>canvas.width+20) this.x=-20;
                if(this.y<-20) this.y=canvas.height+20; if(this.y>canvas.height+20) this.y=-20;
                const dx=this.x-mouseX, dy=this.y-mouseY, dist=Math.sqrt(dx*dx+dy*dy);
                if(dist<180 && dist>0) { const force=(180-dist)/180*0.3; this.vx+=(dx/dist)*force*0.15; this.vy+=(dy/dist)*force*0.15; }
                const speed=Math.sqrt(this.vx*this.vx+this.vy*this.vy), maxSpeed=1.2;
                if(speed>maxSpeed) { this.vx=(this.vx/speed)*maxSpeed; this.vy=(this.vy/speed)*maxSpeed; }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle=this.color+this.opacity+')'; ctx.fill();
                ctx.beginPath(); ctx.arc(this.x,this.y,this.size*3,0,Math.PI*2); ctx.fillStyle=this.color+(this.opacity*0.15)+')'; ctx.fill();
            }
        }
        function initParticles() { particles=[]; for(let i=0;i<particleCount;i++) particles.push(new Particle()); }
        initParticles();

        function drawConnections() {
            for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++) {
                const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, dist=Math.sqrt(dx*dx+dy*dy);
                if(dist<connectionDistance) {
                    const alpha=(1-dist/connectionDistance)*0.08;
                    ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y);
                    ctx.strokeStyle='rgba(255,184,0,'+alpha+')'; ctx.lineWidth=0.5; ctx.stroke();
                }
            }
        }
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{ p.update(); p.draw(); }); drawConnections(); animationId=requestAnimationFrame(animate); }
        animate();
        document.addEventListener('mousemove', e=>{ mouseX=e.clientX; mouseY=e.clientY; });
        document.addEventListener('touchmove', e=>{ if(e.touches.length>0){ mouseX=e.touches[0].clientX; mouseY=e.touches[0].clientY; } }, {passive:true});
        document.addEventListener('visibilitychange', ()=>{ if(document.hidden) cancelAnimationFrame(animationId); else animate(); });
    })();

    (function() {
        const revealEls=document.querySelectorAll('.reveal');
        revealEls.forEach((el,i)=> setTimeout(()=>el.classList.add('revealed'), 120*i));
    })();

    function track(s) { if(typeof fbq!=='undefined') fbq('track','Subscribe',{content_name:'Telegram Join',source:s}); }
    document.getElementById('joinHeroBtn').addEventListener('click', ()=>track('hero'));

    // Auto-redirect after 6 seconds (no tracking fired)
setTimeout(() => {
    window.location.href = "https://t.me/+PKk8iGc2GtthZDVl";
}, 6000);
</script>
